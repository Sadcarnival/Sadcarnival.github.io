<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=https://sadcarnival.github.io/yourday/">
<title>your day</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:#000;color:#fff;
    font-family:'Open Sans',sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .wordmark{font-size:18px;font-weight:300;letter-spacing:2px;color:#bdbdbd;margin-bottom:14px;}
  .msg{font-size:13px;font-weight:300;color:#555;line-height:1.7;max-width:320px;}
  .msg a{color:#86c9a3;text-decoration:none;}
  .msg a:hover{text-decoration:underline;}
  .dot{width:5px;height:5px;border-radius:50%;background:#333;margin:18px auto 0;animation:pulse 1.4s ease infinite;}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.9}}
</style>
</head>
<body>
  <div class="wordmark">your day</div>
  <div class="msg">
    taking you to the app —<br>
    if nothing happens, <a href="https://sadcarnival.github.io/yourday/">tap here</a>
  </div>
  <div class="dot"></div>

  <script>
    // JS fallback in case the meta-refresh is blocked or delayed
    window.location.replace("https://sadcarnival.github.io/yourday/");
  </script>
</body>
</html>
